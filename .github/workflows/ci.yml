name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

jobs:
  server-build:
    name: Go Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: server/go.sum
      - name: go mod tidy
        run: go mod tidy
      - name: Build
        run: CGO_ENABLED=0 go build ./...
      - name: Test
        run: go test ./... -race -timeout 60s

  web-build:
    name: Web Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm install
      - run: npm run build

  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: [server-build, web-build]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASS }}
      - name: Build & Push API image
        uses: docker/build-push-action@v6
        with:
          context: server
          file: server/Dockerfile
          push: true
          tags: |
            ${{ secrets.REGISTRY_HOST }}/aquaverse/api:latest
            ${{ secrets.REGISTRY_HOST }}/aquaverse/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build & Push Web image
        uses: docker/build-push-action@v6
        with:
          context: web
          file: web/Dockerfile
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          push: true
          tags: |
            ${{ secrets.REGISTRY_HOST }}/aquaverse/web:latest
            ${{ secrets.REGISTRY_HOST }}/aquaverse/web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
