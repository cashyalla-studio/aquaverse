name: Android Play Store Deploy

on:
  push:
    branches: [master]
    paths:
      - 'app/**'
  workflow_dispatch:

jobs:
  deploy-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - name: Java 설정
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Flutter 설치
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Ruby 설정
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: app

      - name: Android 키스토어 설정
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

      - name: key.properties 생성
        env:
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          cat > android/key.properties << EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Google Play JSON 키 설정
        env:
          GOOGLE_PLAY_KEY: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
        run: echo "$GOOGLE_PLAY_KEY" > fastlane/google-play-key.json

      - name: Flutter 의존성 설치
        run: flutter pub get

      - name: Fastlane Android Beta 배포
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          API_URL: ${{ secrets.PROD_API_URL }}
        run: bundle exec fastlane android beta
