name: Flutter CI

on:
  push:
    branches: [master, main]
    paths:
      - 'app/**'
  pull_request:
    paths:
      - 'app/**'

jobs:
  flutter-analyze:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: flutter analyze
      - run: flutter test
