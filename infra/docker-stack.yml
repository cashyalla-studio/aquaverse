version: '3.9'

# AquaVerse Docker Stack
# 배포: docker stack deploy -c docker-stack.yml aquaverse

services:

  # ── API 서버 (Go) ──────────────────────────────────────
  api:
    image: ${REGISTRY:-cashyalla.synology.me:50002}/aquaverse/api:${VERSION:-latest}
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        monitor: 15s
      restart_policy:
        condition: on-failure
        max_attempts: 3
    ports:
      - "50100:8080"
    networks:
      - aquaverse-net
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      - TZ=Asia/Seoul
      - AV_SERVER_PORT=8080
      - AV_SERVER_ENV=production
      - AV_DATABASE_DSN=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      - AV_REDIS_ADDR=redis:6379
      - AV_REDIS_PASSWORD=${REDIS_PASSWORD}
      - AV_AUTH_JWT_SECRET=${JWT_SECRET}
      - AV_STORAGE_ENDPOINT=minio:9000
      - AV_STORAGE_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - AV_STORAGE_SECRET_KEY=${MINIO_SECRET_KEY}
      - AV_STORAGE_BUCKET=aquaverse
      - AV_AI_API_KEY=${ANTHROPIC_API_KEY}
      - AV_AI_MODEL=claude-haiku-4-5-20251001
      - AV_NOTIFICATION_FCM_SERVER_KEY=${FCM_SERVER_KEY}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── 웹 (Vite + React) ─────────────────────────────────
  web:
    image: ${REGISTRY:-cashyalla.synology.me:50002}/aquaverse/web:${VERSION:-latest}
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
    ports:
      - "50101:80"
    networks:
      - aquaverse-net
    environment:
      - VITE_API_URL=https://api.aquaverse.app

  # ── Nginx (리버스 프록시 + SSL) ────────────────────────
  nginx:
    image: nginx:1.29-alpine
    ports:
      - "50110:80"
      - "50111:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - aquaverse-net
    depends_on:
      - api
      - web
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  # ── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-aquaverse}
      - POSTGRES_USER=${POSTGRES_USER:-aquaverse}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - aquaverse-net
    deploy:
      placement:
        constraints:
          - node.role == manager  # 데이터 안정성
      restart_policy:
        condition: on-failure
        max_attempts: 3
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aquaverse}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - aquaverse-net
    deploy:
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (이미지 스토리지) ────────────────────────────
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    ports:
      - "50120:9001"  # 콘솔 (관리자)
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    networks:
      - aquaverse-net
    deploy:
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── 마이그레이션 (일회성 실행) ─────────────────────────
  migrate:
    image: ${REGISTRY:-cashyalla.synology.me:50002}/aquaverse/migrate:${VERSION:-latest}
    command: ["migrate", "-path=/migrations", "-database=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable", "up"]
    networks:
      - aquaverse-net
    depends_on:
      - postgres
    deploy:
      restart_policy:
        condition: none  # 성공 후 재시작 없음
      replicas: 1

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  aquaverse-net:
    driver: overlay
    attachable: true
