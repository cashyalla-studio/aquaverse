server:
  port: 8080
  env: development
  allow_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"

database:
  dsn: "postgresql://aquaverse:devpassword@localhost:5432/aquaverse_dev?sslmode=disable"
  max_open_conn: 25
  max_idle_conn: 5

redis:
  addr: "localhost:6379"
  password: "devredis"
  db: 0

auth:
  jwt_secret: "dev-secret-change-in-production-must-be-long"
  access_token_expiry_min: 60
  refresh_token_expiry_day: 30

storage:
  endpoint: "localhost:9000"
  access_key: "minioadmin"
  secret_key: "minioadmin"
  bucket: "aquaverse"
  use_ssl: false

ai:
  provider: "anthropic"
  model: "claude-haiku-4-5-20251001"
  max_tokens: 2048

crawler:
  fishbase_api_base: "https://fishbase.ropensci.org"
  wikipedia_api_base: "https://en.wikipedia.org/api/rest_v1"
  gbif_api_base: "https://api.gbif.org/v1"
  requests_per_minute: 10
  user_agent: "AquaVerse/1.0 (contact@aquaverse.app)"

notification:
  from_email: "noreply@aquaverse.app"
